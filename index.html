<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Maria's Business Card</title>

  <!-- ==================== LIBRERÍAS ==================== -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Zappar para A-Frame -->
  <script src="https://libs.zappar.com/zappar-aframe/2.0.0/zappar-aframe.js"></script>

  <!-- ==================== ESTILOS ==================== -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- ==================== CONTENEDOR PRINCIPAL ==================== -->
  <div id="ar-wrapper">

    <!-- ==================== ENCABEZADO FIJO ==================== -->
    <header class="page-header">
      <h1>Maria's AR business card</h1>
      <p>AR Business Card</p>
    </header>

    <!-- ==================== CONTROLES DE VIDEO ==================== -->
    <div class="controls-container">
      <button id="playPauseBtn" class="control-button">Pausar</button>
      <button id="muteUnmuteBtn" class="control-button">Activar Audio</button>
    </div>

    <!-- ==================== ESCENA AR CON ZAPPAR ==================== -->
    <a-scene zappar color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true">
      
      <!-- ---------- CÁMARA ---------- -->
      <a-camera id="camera" zappar-camera look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

      <!-- ---------- ASSETS ---------- -->
      <a-assets>
        <video id="miVideo" src="./assets/demo.mp4" preload="auto" loop="true" playsinline webkit-playsinline autoplay muted crossorigin="anonymous"></video>
        <img id="iconLinkedin" src="./assets/icon-linkedin.png" />
        <img id="iconGlobe" src="./assets/portfolioIcon.jpg" />
        <img id="iconEmail" src="./assets/icon-mail.png" />
        <a-asset-item id="avatarModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/image-tracking/assets/card-example/softmind/scene.gltf"></a-asset-item>
      </a-assets>

      <!-- ---------- OBJETO DE TRACKING DE ZAPPAR ---------- -->
      <zappar-image-target src="./targets/my-bcard.zpt" id="target">

        <!-- Video plano sobre la tarjeta -->
        <a-plane id="videoPlane"
                 src="#miVideo"
                 position="0 0.4 0"
                 height="0.55"
                 width="1"
                 material="shader: flat; transparent: true">
        </a-plane>

        <!-- Botones de redes sociales -->
        <a-image id="linkedinBtn" class="clickable" src="#iconLinkedin" position="-0.35 -0.5 0" height="0.15" width="0.15"></a-image>
        <a-image id="portfolioBtn" class="clickable" src="#iconGlobe" position="0 -0.5 0" height="0.15" width="0.15"></a-image>
        <a-image id="emailBtn" class="clickable" src="#iconEmail" position="0.35 -0.5 0" height="0.15" width="0.15"></a-image>

      </zappar-image-target>

    </a-scene>

    <!-- ==================== PIE DE PÁGINA FIJO ==================== -->
    <footer class="page-footer">
      <a href="https://blog.realidad-aumentada.com.co" target="_blank" rel="noopener noreferrer">Ver Tutorial</a>
      <a href="https://www.youtube.com/carlosreinamcr" target="_blank" rel="noopener noreferrer">Canal de YouTube</a>
    </footer>

  </div> <!-- Cierre del #ar-wrapper -->

  <!-- ==================== SCRIPT PRINCIPAL ==================== -->
  <script src="app.js"></script>
</body>
</html>
