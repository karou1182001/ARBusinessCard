<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Define la codificación de caracteres a UTF-8 para tildes y "ñ". -->
  <meta charset="UTF-8">

  <!-- Configura el viewport para dispositivos móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Título de la página -->
  <title>AR Business Card</title>

  <!-- Librería A-Frame para escenas 3D y VR/AR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- Complemento MindAR para reconocimiento de imágenes en A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Hoja de estilos externa -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Contenedor principal -->
  <div id="ar-wrapper">

    <!-- Encabezado fijo -->
    <header class="page-header">
      <h1>Tarjeta de Presentación en Realidad Aumentada</h1>
      <p>AR Business Card</p>
    </header>

    <!-- Controles de video (si usas video) -->
    <div class="controls-container">
      <button id="playPauseBtn" class="control-button">Pausar</button>
      <button id="muteUnmuteBtn" class="control-button">Activar Audio</button>
    </div>

    <!-- Overlay de escaneo / UI de tracking -->
    <div id="ui-custom-tracking-overlay" class="ui-custom-tracking-overlay">
      <div class="ui-tracking-square">
        <!-- Imagen de referencia -->
        <img src="./assets/bienvenida.jpg" alt="Marker Target" class="scanning-image">

        <!-- Mensaje de escaneo -->
        <div class="scanning-message">Escanea tu marcador</div>

        <!-- Elementos visuales para animación de escaneo -->
        <div class="ui-scan-line"></div>
        <span></span>
      </div>
    </div>

    <!-- Insertar la escena AR desde un archivo externo -->
    <a-scene mindar-image="imageTargetSrc: ./targets/my-bcard.mind" uiScanning="#ui-custom-tracking-overlay;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true">
          <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

          <a-assets>
            <video id="miVideo" src="./assets/demo.mp4" preload="auto" loop="true" playsinline webkit-playsinline autoplay muted crossorigin="anonymous"></video>
            <img id="imagenSuperior" src="./assets/icon-globe.png" />
            <img id="iconoFacebook" src="./assets/icon-linkedin.png" />
            <img id="iconoYoutube" src="./assets/icon-linkedin.png" />
            <img id="iconoLogo" src="./assets/icon-linkedin.png" />
            <img id="iconoInstagram" src="./assets/icon-mail.png" />
            <img id="iconoWhatsapp" src="./assets/icon-globe.png" />
          </a-assets>

          <a-entity id="target" mindar-image-target="targetIndex: 0">
              <a-plane id="videoPlane"
                      src="#mivideo"
                      position="0 0 0"
                      height="0.55"
                      width="1"
                      material="shader: flat; transparent: true">
              </a-plane>

              <a-image id="imagenSuperiorEl"
                      src="#imagenSuperior"
                      position="0 0.5 0"
                      height="0.4"
                      width="1">
              </a-image>

              <a-image id="facebookBtn"
                      class="clickable"
                      src="#iconoFacebook"
                      position="-0.4 -0.4 0"
                      height="0.15"
                      width="0.15">
              </a-image>

              <a-image id="youtubeBtn" class="clickable" src="#iconoYoutube" position="-0.2 -0.4 0" height="0.15" width="0.15"></a-image>

              <a-image id="blogBtn" class="clickable" src="#iconoblog" position="0 -0.4 0" height="0.15" width="0.15"></a-image>

              <a-image id="instagramBtn" class="clickable" src="#iconoInstagram" position="0.2 -0.4 0" height="0.15" width="0.15"></a-image>

              <a-image id="whatsappBtn" class="clickable" src="#iconoWhatsapp" position="0.4 -0.4 0" height="0.15" width="0.15"></a-image>



            
            <!-- Botones interactivos (redes sociales) -->
            <a-image id="facebookBtn" class="clickable" src="#iconoFacebook" width="0.5" height="0.5" position="-0.8 -0.5 0"></a-image>
            <a-image id="twitterBtn" class="clickable" src="#iconoTwitter" width="0.5" height="0.5" position="0 0.5 0"></a-image>
            <!-- Agregar otros botones según sea necesario -->
          </a-entity>
        </a-scene>


    <!-- Pie de página fijo -->
    <footer class="page-footer">
      <a href="https://blog.realidad-aumentada.com.co" target="_blank" rel="noopener noreferrer">Ver Tutorial</a>
      <a href="https://www.youtube.com/carlosreinamcr" target="_blank" rel="noopener noreferrer">Canal de YouTube</a>
    </footer>

  </div> <!-- Cierre del #ar-wrapper -->

  <!-- Llamada al archivo app.js al final del body para que cargue después de la estructura HTML -->
  <script src="app.js"></script>
</body>
</html>
