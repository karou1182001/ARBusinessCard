<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Define la codificación de caracteres a UTF-8 para tildes y "ñ". -->
  <meta charset="UTF-8">

  <!-- Configura el viewport para dispositivos móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Título de la página -->
  <title>AR Business Card</title>

  <!-- Librería A-Frame para escenas 3D y VR/AR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- Complemento MindAR para reconocimiento de imágenes en A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Hoja de estilos externa -->
  <style>
    /* Estilos generales del body */
    body {
      margin: 0; /* Elimina los márgenes predeterminados del navegador. */
      /* overflow: hidden; -> Comentado para que AdSense pueda añadir barras de scroll si es necesario. */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; /* Fuentes modernas y comunes en la mayoría de dispositivos. */
      color: #ffffff; /* Color del texto por defecto: blanco. */
      background-color: #000; /* Fondo negro para evitar destello blanco al cargar. */
    }

    /* Estilo para el contenedor que envuelve toda la experiencia AR */
    #ar-wrapper {
      position: relative; /* Base para posicionar elementos internos como los botones. */
      width: 100%; /* Ocupa todo el ancho disponible. */
      height: 100vh; /* Ocupa el 100% de la altura de la ventana del navegador. */
      overflow: hidden; /* Evita que la escena 3D se desborde y cree barras de scroll no deseadas. */
    }

    /* Estilos para el encabezado y pie de página */
    .page-header, .page-footer {
      position: fixed; /* Los mantiene fijos en la pantalla aunque el contenido se mueva. */
      left: 0; /* Los alinea al borde izquierdo. */
      width: 100%; /* Hace que ocupen todo el ancho. */
      text-align: center; /* Centra el texto en su interior. */
      z-index: 11; /* Un número alto para asegurar que estén por encima de todo lo demás. */
      background-color: rgba(0, 0, 0, 0.6); /* Fondo negro semitransparente. */
      backdrop-filter: blur(8px); /* Desenfoque tipo "vidrio esmerilado". */
      -webkit-backdrop-filter: blur(8px); /* Versión para navegadores como Safari. */
      padding: 10px 0; /* Espaciado interno (10px arriba/abajo, 0px a los lados). */
      box-sizing: border-box; /* Asegura que el padding no aumente el ancho total del elemento. */
    }

    /* Estilos específicos para el encabezado */
    .page-header {
      top: 0; /* Lo pega a la parte superior de la pantalla. */
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* Línea divisoria sutil en la parte inferior. */
    }

    /* Estilo del título principal (H1) */
    .page-header h1 {
      margin: 0; /* Elimina márgenes. */
      font-size: clamp(1.2rem, 3vw, 1.5rem); /* Tamaño de fuente adaptable. */
      font-weight: 600; /* Texto en seminegrita. */
      color: #ffffff; /* Color de texto blanco. */
      text-shadow: 0 0 8px rgba(0, 136, 255, 0.7); /* Sombra de texto azul. */
    }

    /* Estilos específicos para el pie de página */
    .page-footer {
      bottom: 0; /* Lo pega a la parte inferior de la pantalla. */
      border-top: 1px solid rgba(255, 255, 255, 0.1); /* Línea divisoria sutil en la parte superior. */
    }

    /* Estilos para los enlaces (<a>) del pie de página */
    .page-footer a {
      color: #5bcaff; /* Color azul claro. */
      text-decoration: none; /* Quita el subrayado. */
      margin: 0 15px; /* Espaciado entre los enlaces. */
      transition: color 0.3s ease; /* Transición suave del color al pasar el mouse. */
    }

    .page-footer a:hover {
      color: #ffffff; /* Cambia el color a blanco al pasar el mouse. */
      text-decoration: underline; /* Añade un subrayado al pasar el mouse. */
    }

    /* Estilo de los botones de control */
    .controls-container {
      position: absolute; /* Posicionado relativo a su padre (#ar-wrapper). */
      top: 85px; /* Lo baja 85px desde la parte superior para no chocar con el header. */
      left: 50%; /* Lo mueve al 50% del ancho de su padre. */
      transform: translateX(-50%); /* Lo desplaza hacia la izquierda el 50% de su propio ancho para centrarlo. */
      z-index: 10; /* Asegura que esté por encima de la escena AR pero debajo del header/footer. */
      display: flex; /* Coloca los botones uno al lado del otro. */
      gap: 10px; /* Crea un espacio de 10px entre los botones. */
    }

    /* Estilo de los botones de control */
    .control-button {
      padding: 10px 15px; /* Espaciado interno del botón. */
      font-size: 16px; /* Tamaño del texto. */
      background-color: rgba(0, 0, 0, 0.6); /* Fondo semitransparente. */
      border: none; /* Sin borde. */
      border-radius: 8px; /* Bordes redondeados. */
      cursor: pointer; /* Cambia el cursor a una mano para indicar que es clickeable. */
      backdrop-filter: blur(5px); /* Efecto de desenfoque. */
      transition: background-color 0.3s ease; /* Transición suave del color de fondo. */
    }

    .control-button:hover {
      background-color: rgba(0, 0, 0, 0.8); /* Oscurece el botón al pasar el mouse. */
    }

    /* La pantalla de escaneo mientras se busca el marcador */
    .ui-custom-tracking-overlay {
      position: fixed; /* Fija la pantalla para que ocupe toda la ventana. */
      top: 0; left: 0; width: 100%; height: 100%; /* Cubre toda la pantalla. */
      pointer-events: none; /* Permite que los clics atraviesen esta capa. */
      z-index: 9; /* Se posiciona justo debajo de los controles. */
      opacity: 1; /* Totalmente visible por defecto. */
      transition: opacity 0.5s ease; /* Desaparición suave. */
    }

    /* Clase para ocultar el overlay */
    .ui-custom-tracking-overlay.hidden {
      opacity: 0; /* Hace la capa invisible. */
    }

    /* El cuadro central donde se muestra la imagen de referencia */
    .ui-tracking-square {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%); /* Lo centra perfectamente. */
    }

    /* Creación de las esquinas del cuadro usando pseudo-elementos */
    .ui-tracking-square::before,
    .ui-tracking-square::after,
    .ui-tracking-square span::before,
    .ui-tracking-square span::after 
    {
      content: ''; /* Necesario para que los pseudo-elementos se muestren. */
      position: absolute;
      width: var(--corner-size); /* Usa las variables definidas en :root. */
      height: var(--corner-size);
      border: var(--border-thickness) solid var(--primary-colorUI);
      filter: drop-shadow(0 0 5px rgba(0, 136, 255, 0.7)); /* Efecto de brillo alrededor de las esquinas. */
      animation: ui-corner-glow 3s infinite ease-in-out; /* Aplica la animación de brillo. */
    }
    /* Posiciona cada una de las 4 esquinas */
    .ui-tracking-square::before { /* Esquina superior izquierda */
      top: -2px; left: -2px;
      border-right: none; border-bottom: none;
    }
    .ui-tracking-square::after { /* Esquina superior derecha */
      top: -2px; right: -2px;
      border-left: none; border-bottom: none;
    }
    .ui-tracking-square span::before { /* Esquina inferior izquierda */
      bottom: -2px; left: -2px;
      border-top: none; border-right: none;
    }
    .ui-tracking-square span::after { /* Esquina inferior derecha */
      bottom: -2px; right: -2px;
      border-top: none; border-left: none;
    }

    /* La línea animada que se mueve de arriba a abajo */
    .ui-scan-line {
      position: absolute;
      width: 100%; /* La línea ocupa todo el ancho disponible. */
      height: 2px; /* Alto de la línea. */
      background-color: var(--primary-colorUI); /* Color de la línea. */
      animation: ui-scan-animation 3s infinite ease-in-out; /* Aplica la animación de movimiento. */
    }

    /* Animación de la línea de escaneo */
    @keyframes ui-scan-animation {
      0%, 100% { top: 0; }
      50% { top: 100%; }
    }

    /* Animación de brillo para las esquinas */
    /* Animación de brillo para las esquinas */
    @keyframes ui-corner-glow {
      0% { filter: drop-shadow(0 0 5px rgba(0, 136, 255, 0.7)); } /* Primer estado con sombra suave */
      100% { filter: drop-shadow(0 0 20px rgba(0, 136, 255, 1)); } /* Segundo estado con sombra más intensa */
    }

  </style>
</head>

<body>
  <!-- Contenedor principal -->
  <div id="ar-wrapper">

    <!-- Encabezado fijo -->
    <header class="page-header">
      <h1>Tarjeta de Presentación en Realidad Aumentada</h1>
      <p>AR Business Card</p>
    </header>

    <!-- Controles de video (si usas video) -->
    <div class="controls-container">
      <button id="playPauseBtn" class="control-button">Pausar</button>
      <button id="muteUnmuteBtn" class="control-button">Activar Audio</button>
    </div>

    <!-- Overlay de escaneo / UI de tracking -->
    <div id="ui-custom-tracking-overlay" class="ui-custom-tracking-overlay">
      <div class="ui-tracking-square">
        <!-- Imagen de referencia -->
        <img src="./assets/bienvenida.jpg" alt="Marker Target" class="scanning-image">

        <!-- Mensaje de escaneo -->
        <div class="scanning-message">Escanea tu marcador</div>

        <!-- Elementos visuales para animación de escaneo -->
        <div class="ui-scan-line"></div>
        <span></span>
      </div>
    </div>

    <!-- Insertar la escena AR desde un archivo externo -->
    <a-scene mindar-image="imageTargetSrc: ./targets/my-bcard.mind" uiScanning="#ui-custom-tracking-overlay;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true">
          <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

          <a-assets>
            <video id="miVideo" src="./assets/demo.mp4" preload="auto" loop="true" playsinline webkit-playsinline autoplay muted crossorigin="anonymous"></video>
            <img id="imagenSuperior" src="./assets/icon-globe.png" />
            <img id="iconoFacebook" src="./assets/icon-linkedin.png" />
            <img id="iconoYoutube" src="./assets/icon-linkedin.png" />
            <img id="iconoLogo" src="./assets/icon-linkedin.png" />
            <img id="iconoInstagram" src="./assets/icon-mail.png" />
            <img id="iconoWhatsapp" src="./assets/icon-globe.png" />
          </a-assets>

          <a-entity id="target" mindar-image-target="targetIndex: 0">
              <a-plane id="videoPlane"
                      src="#mivideo"
                      position="0 0 0"
                      height="0.55"
                      width="1"
                      material="shader: flat; transparent: true">
              </a-plane>

              <a-image id="imagenSuperiorEl"
                      src="#imagenSuperior"
                      position="0 0.5 0"
                      height="0.4"
                      width="1">
              </a-image>

              <a-image id="facebookBtn"
                      class="clickable"
                      src="#iconoFacebook"
                      position="-0.4 -0.4 0"
                      height="0.15"
                      width="0.15">
              </a-image>

              <a-image id="youtubeBtn" class="clickable" src="#iconoYoutube" position="-0.2 -0.4 0" height="0.15" width="0.15"></a-image>

              <a-image id="blogBtn" class="clickable" src="#iconoblog" position="0 -0.4 0" height="0.15" width="0.15"></a-image>

              <a-image id="instagramBtn" class="clickable" src="#iconoInstagram" position="0.2 -0.4 0" height="0.15" width="0.15"></a-image>

              <a-image id="whatsappBtn" class="clickable" src="#iconoWhatsapp" position="0.4 -0.4 0" height="0.15" width="0.15"></a-image>



            
            <!-- Botones interactivos (redes sociales) -->
            <a-image id="facebookBtn" class="clickable" src="#iconoFacebook" width="0.5" height="0.5" position="-0.8 -0.5 0"></a-image>
            <a-image id="twitterBtn" class="clickable" src="#iconoTwitter" width="0.5" height="0.5" position="0 0.5 0"></a-image>
            <!-- Agregar otros botones según sea necesario -->
          </a-entity>
        </a-scene>


    <!-- Pie de página fijo -->
    <footer class="page-footer">
      <a href="https://blog.realidad-aumentada.com.co" target="_blank" rel="noopener noreferrer">Ver Tutorial</a>
      <a href="https://www.youtube.com/carlosreinamcr" target="_blank" rel="noopener noreferrer">Canal de YouTube</a>
    </footer>

  </div> <!-- Cierre del #ar-wrapper -->

  <!-- Llamada al archivo app.js al final del body para que cargue después de la estructura HTML -->
  <script>
      // Este es el punto de partida. Se asegura de que el script no se ejecute hasta que todo el HTML se haya cargado y esté listo.
      document.addEventListener('DOMContentLoaded', () => {
        
        // Selecciona el componente principal de A-Frame, la escena.
        const sceneEl = document.querySelector('a-scene');
        
        // Espera a que A-Frame haya cargado completamente la escena y todos sus componentes internos.
        sceneEl.addEventListener('loaded', () => {

          // --- SELECCIÓN DE ELEMENTOS ---
          // Se crean constantes para tener acceso rápido y fácil a los elementos clave del HTML.
          const target = document.querySelector('#target'); // La entidad que representa el marcador.
          const video = document.querySelector('#miVideo'); // El elemento <video>.
          const playPauseBtn = document.querySelector('#playPauseBtn'); // Botón de Pausar/Reproducir.
          const muteUnmuteBtn = document.querySelector('#muteUnmuteBtn'); // Botón de Silenciar/Activar Audio.
          const imagenSuperiorEl = document.querySelector('#imagenSuperiorEl'); // La imagen 3D que se desvanece.
          const scanningOverlay = document.getElementById('ui-custom-tracking-overlay'); // La pantalla de escaneo.

          // --- VARIABLES DE ESTADO ---
          let hideImageTimeout; // Guardará el temporizador para la animación de la imagen. Permite cancelarlo si es necesario.
          let isTargetEverFound = false; // Variable CRÍTICA: Actúa como un interruptor.

          // --- CONTROL DEL VIDEO ---
          playPauseBtn.addEventListener('click', () => {
            // Si el marcador nunca ha sido encontrado, la función se detiene aquí.
            if (!isTargetEverFound) return;
            
            // Si el video está pausado, lo reproduce.
            if (video.paused) {
              video.play();
              playPauseBtn.textContent = 'Pausar';
            } else {
              video.pause(); // Si se está reproduciendo, lo pausa.
              playPauseBtn.textContent = 'Reproducir'; // Actualiza el texto del botón.
            }
          });

          // Lógica para el botón de Silenciar/Activar Sonido.
          muteUnmuteBtn.addEventListener('click', () => {
            if (!isTargetEverFound) return; // Misma barrera de seguridad.
            
            // Invierte el estado de 'muted' (silenciar/activar sonido).
            video.muted = !video.muted;
            
            // Actualiza el texto del botón según el nuevo estado de 'muted'.
            muteUnmuteBtn.textContent = video.muted ? 'Activar Sonido' : 'Silenciar';
          });

          // --- EVENTOS DE MINDAR ---
          // Se ejecuta cuando la cámara PIERDE de vista el marcador.
          target.addEventListener("targetLost", () => {
            video.pause(); // Pausa el video inmediatamente.
            playPauseBtn.textContent = 'Reproducir'; // Actualiza el botón.
            scanningOverlay.classList.remove('hidden'); // Muestra la pantalla de escaneo.
            
            clearTimeout(hideImageTimeout); // Cancela cualquier temporizador pendiente para desvanecer la imagen.
            
            // Restablece la imagen superior a su estado inicial.
            imagenSuperiorEl.setAttribute('visible', true);
            imagenSuperiorEl.setAttribute('material', 'opacity', 1);
          });

          // Se ejecuta cuando la cámara ENCUENTRA el marcador.
          target.addEventListener("targetFound", () => {
            // Cambia la variable de estado a 'true'.
            isTargetEverFound = true;
            
            if (video.paused) {
              video.play(); // Si el video estaba pausado, lo reproduce.
              playPauseBtn.textContent = 'Pausar'; // Actualiza el texto del botón.
            }
            
            scanningOverlay.classList.add('hidden'); // Oculta la pantalla de escaneo.
            
            // Restablece la opacidad de la imagen superior.
            imagenSuperiorEl.setAttribute('material', 'opacity', 1);
            imagenSuperiorEl.removeAttribute('animation'); // Elimina cualquier animación anterior.
            
            clearTimeout(hideImageTimeout); // Limpia cualquier temporizador pendiente.

            // Inicia un nuevo temporizador para desvanecer la imagen después de 5 segundos.
            hideImageTimeout = setTimeout(() => {
              imagenSuperiorEl.setAttribute('animation', {
                property: 'material.opacity', // La propiedad a animar (la opacidad del material).
                from: 1, // Valor inicial (totalmente opaco).
                to: 0, // Valor final (totalmente transparente).
                dur: 1500, // Duración de la animación (1.5 segundos).
                easing: 'easeInQuad' // Tipo de aceleración para el desvanecimiento suave.
              });
            }, 5000); // La animación se ejecuta después de 5 segundos.
          });

          // --- LÓGICA DE REDES SOCIALES ---
          // Objeto que asocia el ID de cada ícono con su URL correspondiente.
          const links = {
            facebookBtn: 'https://mariazapata.vercel.app/',
            youtubeBtn: 'https://mariazapata.vercel.app/',
            blogBtn: 'https://mariazapata.vercel.app/',
            instagramBtn: 'https://mariazapata.vercel.app/',
            whatsappBtn: 'https://mariazapata.vercel.app/',
            // ... otros enlaces de redes sociales.
          };
          
          // Este bucle recorre el objeto 'links' y asigna un evento de clic a cada ícono.
          for (const [id, url] of Object.entries(links)) {
            const button = document.querySelector(`#${id}`); // Selecciona el ícono por su ID.
            button.addEventListener('click', () => { // Añade el evento de clic.
              window.open(url, '_blank'); // Abre el enlace en una nueva pestaña.
            });
          }
        });
      });




  </script>
</body>
</html>
