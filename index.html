<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Maria's Business Card</title>

  <!-- Librería A-Frame para escenas 3D y VR/AR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Complemento MindAR para reconocimiento de imágenes en A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Contenedor principal -->
  <div id="ar-wrapper">

    <!-- Encabezado fijo -->
    <header class="page-header">
      <h1>Maria's AR business card</h1>
      <p>AR Business Card</p>
    </header>

    <!-- Controles de video (si usas video) -->
    <div class="controls-container">
      <button id="playPauseBtn" class="control-button">Pausar</button>
      <button id="muteUnmuteBtn" class="control-button">Activar Audio</button>
    </div>

    <!-- Overlay de escaneo / UI de tracking -->
    <div id="ui-custom-tracking-overlay" class="ui-custom-tracking-overlay">
      <div class="ui-tracking-square">
        <!-- Imagen de referencia -->
        <img src="./assets/bienvenida.jpg" alt="Marker Target" class="scanning-image">

        <!-- Mensaje de escaneo -->
        <div class="scanning-message">Scan QR code</div>

        <!-- Elementos visuales para animación de escaneo -->
        <div class="ui-scan-line"></div>
        <span></span>
      </div>
    </div>

    <!-- ------------------------------------------------------------------------------------- -->
    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

      <a-assets>
        <!-- Video y otros recursos -->
        <video id="miVideo" src="./assets/demo.mp4" preload="auto" loop="true" playsinline webkit-playsinline autoplay muted crossorigin="anonymous"></video>
        <!-- Iconos de redes sociales -->
        <img id="iconLinkedin" src="./assets/icon-linkedin.png" />
        <img id="iconGlobe" src="./assets/icon-globe.png" />
        <img id="iconEmail" src="./assets/icon-mail.png" />
      </a-assets>

      <!-- Entidad con el target AR -->
      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <!-- Video plano -->
        <a-plane id="videoPlane"
                src="#miVideo"
                position="0 1 0"
                height="0.55"
                width="1"
                material="shader: flat; transparent: true">
        </a-plane>

        <!-- Botones centrados de redes sociales -->
        <a-image id="linkedinBtn" class="clickable" src="#iconoLinkedin" position="-0.35 -0.4 0" height="0.15" width="0.15"></a-image>
        <a-image id="portfolioBtn" class="clickable" src="#iconGlobe" position="0 -0.4 0" height="0.15" width="0.15"></a-image>
        <a-image id="emailBtn" class="clickable" src="#iconEmail" position="0.35 -0.4 0" height="0.15" width="0.15"></a-image>
      </a-entity>
    </a-scene>

    <!-- ------------------------------------------------------------------------------------- -->

    <!-- Pie de página fijo -->
    <footer class="page-footer">
      <a href="https://blog.realidad-aumentada.com.co" target="_blank" rel="noopener noreferrer">Ver Tutorial</a>
      <a href="https://www.youtube.com/carlosreinamcr" target="_blank" rel="noopener noreferrer">Canal de YouTube</a>
    </footer>

  </div> <!-- Cierre del #ar-wrapper -->

  <!-- Llamada al archivo app.js al final del body para que cargue después de la estructura HTML -->
  <script src="app.js"></script>
</body>
</html>
